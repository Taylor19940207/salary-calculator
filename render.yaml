services:
  - type: web
    name: salary-calculator
    runtime: node
    plan: free # 常駐させたい場合は starter に変更
    # --include=dev: Render は NODE_ENV=production を自動注入するため、
    # 明示しないと npm ci が devDependencies (vite/tsc/@types) をスキップしてビルドが壊れる
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_PATH
        value: /tmp/salary_calculator.db
      - key: BASIC_AUTH_USER
        sync: false # Render ダッシュボードで設定
      - key: BASIC_AUTH_PASS
        sync: false # Render ダッシュボードで設定
